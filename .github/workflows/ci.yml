name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build core
        run: npm run build -w packages/core

      - name: Build adapter-sqlite
        run: npm run build -w packages/adapter-sqlite

      - name: Run tests
        run: npm test
